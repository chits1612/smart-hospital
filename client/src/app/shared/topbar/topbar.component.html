<header class="flex items-center justify-between h-14 px-5 border-b border-zinc-900 bg-black flex-shrink-0">
  <!-- Left: Menu toggle + breadcrumb -->
  <div class="flex items-center gap-4">
    <button
      (click)="menuClick.emit()"
      class="p-1.5 rounded-md text-zinc-500 hover:text-white hover:bg-zinc-900 transition-colors"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>

    <!-- Live badge -->
    <div class="hidden sm:flex items-center gap-2 px-3 py-1 bg-zinc-950 rounded-full border border-zinc-800">
      <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
      <span class="text-xs text-zinc-400 font-medium">Live</span>
    </div>
  </div>

  <!-- Right: Time + Alerts + Search -->
  <div class="flex items-center gap-3">
    <!-- Time -->
    <span class="hidden md:block text-xs text-zinc-600 font-mono tabular-nums">
      {{ currentTime | date:'HH:mm:ss' }}
    </span>

    <!-- Search -->
    <div class="hidden md:flex items-center gap-2 bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-1.5">
      <svg class="w-3.5 h-3.5 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607z" />
      </svg>
      <input
        type="text"
        placeholder="Search patient..."
        class="bg-transparent text-xs text-zinc-400 placeholder-zinc-700 outline-none w-28 focus:w-40 transition-all duration-200"
      />
    </div>

    <!-- Alerts bell -->
    @if (hospitalService.stats$ | async; as stats) {
      <a
        routerLink="/alerts"
        class="relative p-1.5 rounded-md text-zinc-500 hover:text-white hover:bg-zinc-900 transition-colors"
      >
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
        </svg>
        @if (stats.criticalAlerts > 0) {
          <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 rounded-full text-[9px] font-bold text-white flex items-center justify-center">
            {{ stats.criticalAlerts }}
          </span>
        }
      </a>
    }

    <!-- Avatar -->
    <div class="w-7 h-7 bg-zinc-800 rounded-full flex items-center justify-center text-xs font-semibold text-white cursor-pointer hover:bg-zinc-700 transition-colors">
      A
    </div>
  </div>
</header>
